<!doctype html><html lang='th'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Branch Simulator (จำลองหน้าจอสาขา)</title>
<style>
body{font-family:Arial,sans-serif;background:#222;margin:0;color:#333}
.card{max-width:420px;margin:24px auto;background:#fff;border-radius:20px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
h2{color:#ef6c00}button{width:100%;padding:14px;border:0;border-radius:12px;background:#ef6c00;color:#fff;font-size:18px}
button:disabled{background:#ccc}
.hidden{display:none}.center{text-align:center}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.keypad button{background:#f5f5f5;color:#333}
#door{height:120px;background:#ddd;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px}
.err{color:#c62828;font-size:14px;min-height:18px}
.loading{opacity:.6;pointer-events:none}
.tag{background:#333;color:#fff;text-align:center;padding:6px;font-size:12px;border-radius:8px;margin-bottom:12px}
</style></head><body>

<div class="card" id=p4>
  <div class=tag id=tagP4>🔧 จำลองหน้าจอสาขา (แทน ESP32 จริง)</div>
  <h2 class=center>กรอกรหัสปลดล็อก</h2>
  <input id=code readonly style='font-size:28px;text-align:center;width:100%;box-sizing:border-box;padding:10px'><br><br>
  <div class=keypad id=kp></div><br>
  <div class="err center" id=p4err></div>
  <button onclick="check()" id=checkBtn>ยืนยัน</button>
</div>

<div class="card hidden center" id=p5>
  <div class=tag id=tagP5>🔧 จำลองหน้าจอสาขา (แทน ESP32 จริง)</div>
  <h2>ปลดล็อกสำเร็จ</h2>
  <div id=door>🔓 ประตูเปิด</div>
  <p>หยิบสินค้า แล้วปิดประตู ระบบจะล็อกทันที</p>
  <button onclick="location.reload()">รีเซ็ต (จำลองปิดประตู)</button>
</div>

<script>
// ===== CONFIG =====
const API_URL = 'https://script.google.com/macros/s/AKfycbyCQuzspeSSjobh5PKNwXk6UyrNMSikp7WLmm-SHN2Sz11v_baec3OKf1_EuNiGX6mx/exec';

// BRANCH_ID now comes from the URL's ?branch=... query string, not a
// hardcoded constant. This lets one single HTML file serve every branch:
// each branch's QR code just points to the same URL with a different
// ?branch= value, e.g.
//   https://yourdomain.com/branch.html?branch=001
//   https://yourdomain.com/branch.html?branch=002
//   https://yourdomain.com/branch.html?branch=003
const urlParams = new URLSearchParams(window.location.search);
const BRANCH_ID = urlParams.get('branch');

if (!BRANCH_ID) {
  document.body.innerHTML =
    '<div class="card center"><h2>QR ไม่ถูกต้อง</h2><p>ไม่พบรหัสสาขาใน URL กรุณาสแกน QR ที่ตู้อีกครั้ง</p></div>';
  throw new Error('Missing branch_id in URL');
}

document.getElementById('tagP4').textContent = '🔧 จำลองหน้าจอสาขา ' + BRANCH_ID + ' (แทน ESP32 จริง)';
document.getElementById('tagP5').textContent = '🔧 จำลองหน้าจอสาขา ' + BRANCH_ID + ' (แทน ESP32 จริง)';

async function callApi(action, params) {
  const query = new URLSearchParams({ action, branch_id: BRANCH_ID, ...params });
  const res = await fetch(API_URL + '?' + query.toString());
  const data = await res.json();
  return data;
}

function show(id) {
  ['p4','p5'].forEach(x => document.getElementById(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function setLoading(el, isLoading) {
  el.classList.toggle('loading', isLoading);
}

for (let i = 1; i <= 9; i++) {
  let b = document.createElement('button');
  b.textContent = i;
  b.onclick = () => code.value += i;
  kp.appendChild(b);
}
let c = document.createElement('button'); c.textContent = '⌫'; c.onclick = () => code.value = code.value.slice(0, -1); kp.appendChild(c);
let z = document.createElement('button'); z.textContent = '0'; z.onclick = () => code.value += '0'; kp.appendChild(z);
let x = document.createElement('button'); x.textContent = 'CLR'; x.onclick = () => code.value = ''; kp.appendChild(x);

async function check() {
  p4err.textContent = '';
  setLoading(document.getElementById('p4'), true);
  checkBtn.disabled = true;
  try {
    const data = await callApi('verifyToken', { token: code.value });
    if (data.success) {
      show('p5');
    } else {
      p4err.textContent = data.error || 'รหัสไม่ถูกต้อง';
      code.value = '';
    }
  } catch (err) {
    p4err.textContent = 'เชื่อมต่อไม่ได้ กรุณาลองใหม่';
  } finally {
    setLoading(document.getElementById('p4'), false);
    checkBtn.disabled = false;
  }
}
</script>
</body></html>
