<!doctype html><html lang='th'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Smart Self-Serve Demo</title>
<style>
body{font-family:Arial,sans-serif;background:#fff7ef;margin:0;color:#333}
.card{max-width:420px;margin:24px auto;background:#fff;border-radius:20px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.12)}
h1{color:#ef6c00}button{width:100%;padding:14px;border:0;border-radius:12px;background:#ef6c00;color:#fff;font-size:18px}
button:disabled{background:#ccc}
.hidden{display:none}.center{text-align:center}.price{font-size:42px;font-weight:bold}.pass{font-size:36px;letter-spacing:4px;color:#ef6c00}
.err{color:#c62828;font-size:14px;min-height:18px}
.loading{opacity:.6;pointer-events:none}
.testlink{display:block;text-align:center;margin-top:16px;color:#aaa;font-size:12px;text-decoration:none}
</style></head><body>
<div class=card id=p1>
  <h1 id=productName>สู้นะ! ข้าวหมูทอด</h1>
  <p>อิ่มดีจัง มีตังค์เหลือเก็บ</p>
  <div class=price>33 บาท</div>
  <p>เหลือวันนี้ <b id=stock>-</b> กล่อง</p>
  <button onclick="goPay()">ซื้อเลย</button>
</div>

<div class="card hidden" id=p2>
  <h2>ชำระเงิน</h2>
  <p>จำนวน <input id=qty type=number min=1 value=1 style='width:60px'> กล่อง</p>
  <p>รวม <span id=total>33</span> บาท</p>
  <div style='height:180px;background:#eee;border-radius:10px;display:flex;align-items:center;justify-content:center'>QR MOCK</div><br>
  <div class=err id=p2err></div>
  <button onclick="paid()" id=paidBtn>ชำระเงินแล้ว</button>
</div>

<div class="card hidden center" id=p3>
  <h2>ชำระเงินสำเร็จ</h2>
  <div class=pass id=pass></div>
  <p>กรอกรหัสปลดล็อก 6 หลักนี้ที่ตู้</p>
  <button onclick="location.reload()">เสร็จสิ้น</button>
  <a class=testlink href="branch.html" target="_blank">ทดสอบหน้าจอสาขา (สำหรับทีมงานเท่านั้น)</a>
</div>

<script>
// ===== CONFIG =====
const API_URL = 'https://script.google.com/macros/s/AKfycbyCQuzspeSSjobh5PKNwXk6UyrNMSikp7WLmm-SHN2Sz11v_baec3OKf1_EuNiGX6mx/exec';
const BRANCH_ID = '001';
const UNIT_PRICE = 33;

async function callApi(action, params) {
  const query = new URLSearchParams({ action, branch_id: BRANCH_ID, ...params });
  const res = await fetch(API_URL + '?' + query.toString());
  const data = await res.json();
  return data;
}

function show(id) {
  ['p1','p2','p3'].forEach(x => document.getElementById(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function setLoading(el, isLoading) {
  el.classList.toggle('loading', isLoading);
}

async function loadStock() {
  try {
    const data = await callApi('getStock', {});
    if (data.success) {
      stock.textContent = data.current_stock;
      if (data.product_name) productName.textContent = 'สู้นะ! ' + data.product_name;
    } else {
      stock.textContent = '?';
    }
  } catch (err) {
    stock.textContent = '?';
  }
}
loadStock();

function goPay() {
  show('p2');
}

qty.oninput = () => total.textContent = qty.value * UNIT_PRICE;

async function paid() {
  p2err.textContent = '';
  setLoading(document.getElementById('p2'), true);
  paidBtn.disabled = true;
  try {
    const data = await callApi('createOrder', { qty: qty.value });
    if (data.success) {
      pass.textContent = data.token;
      show('p3');
    } else {
      p2err.textContent = data.error || 'เกิดข้อผิดพลาด กรุณาลองใหม่';
    }
  } catch (err) {
    p2err.textContent = 'เชื่อมต่อไม่ได้ กรุณาลองใหม่';
  } finally {
    setLoading(document.getElementById('p2'), false);
    paidBtn.disabled = false;
  }
}
</script>
</body></html>
